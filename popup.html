<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stop Doom Scrolling</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #222;
      background: #fff;
    }

    /* ── header ── */
    .top {
      background: linear-gradient(135deg, #d32f2f 0%, #e64a19 100%);
      padding: 16px 18px 14px;
      color: white;
    }
    .top h1 { font-size: 16px; font-weight: 800; letter-spacing: .3px; }
    .top p  { font-size: 11px; opacity: .85; margin-top: 3px; }

    /* ── main body ── */
    .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 14px; }

    /* ── toggle row ── */
    .row { display: flex; align-items: center; justify-content: space-between; }
    .row label { font-weight: 600; }
    .row .hint  { font-size: 11px; color: #888; margin-top: 2px; }

    /* toggle switch */
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0; cursor: pointer;
      background: #ccc; border-radius: 24px; transition: background .2s;
    }
    .slider:before {
      content: ''; position: absolute;
      width: 18px; height: 18px; left: 3px; bottom: 3px;
      background: white; border-radius: 50%; transition: transform .2s;
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
    }
    input:checked + .slider { background: #d32f2f; }
    input:checked + .slider:before { transform: translateX(20px); }

    /* ── stats ── */
    .stats {
      background: #fff8e1;
      border: 1px solid #ffe082;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 13px;
      color: #555;
    }
    .stats b { color: #d32f2f; font-size: 18px; }

    /* ── suggestions textarea ── */
    .label-row { display: flex; align-items: baseline; justify-content: space-between; }
    .label-row span { font-weight: 600; }
    .label-row small { font-size: 11px; color: #888; }

    textarea {
      width: 100%; height: 200px;
      border: 1px solid #ddd; border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px; line-height: 1.5;
      resize: vertical;
      font-family: inherit;
      color: #333;
    }
    textarea:focus { outline: none; border-color: #e64a19; }

    /* ── buttons ── */
    .btn-row { display: flex; gap: 8px; }
    button {
      flex: 1; padding: 10px;
      border: none; border-radius: 6px;
      font-size: 13px; font-weight: 700;
      cursor: pointer; transition: opacity .15s;
    }
    button:hover { opacity: .88; }
    .btn-save    { background: #d32f2f; color: white; }
    .btn-reset   { background: #f5f5f5; color: #555; border: 1px solid #ddd; }
    .btn-preview { background: #1976d2; color: white; }

    /* ── status toast ── */
    #toast {
      text-align: center; font-size: 12px; font-weight: 600;
      color: #388e3c; min-height: 16px;
      transition: opacity .3s;
    }
    #toast.err { color: #d32f2f; }

    hr { border: none; border-top: 1px solid #f0f0f0; }

    .footer {
      padding: 8px 16px 12px;
      font-size: 11px; color: #aaa; text-align: center;
    }
  </style>
</head>
<body>

  <div class="top">
    <h1>🛑 Stop Doom Scrolling</h1>
    <p>Intervenes on Facebook &amp; Instagram before your brain melts.</p>
  </div>

  <div class="body">

    <!-- Enable / Disable -->
    <div class="row">
      <div>
        <div style="font-weight:600">Extension enabled</div>
        <div class="hint">Triggers on 7 min / page bottom / every 5–10 posts</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="toggle" checked />
        <span class="slider"></span>
      </label>
    </div>

    <hr />

    <!-- Stats -->
    <div class="stats">
      Reality checks delivered: <b id="count">0</b>
    </div>

    <hr />

    <!-- Suggestions editor -->
    <div>
      <div class="label-row">
        <span>Suggestions list</span>
        <small>one per line</small>
      </div>
      <textarea id="suggestions" placeholder="One suggestion per line…"></textarea>
    </div>

    <!-- Buttons -->
    <div class="btn-row">
      <button class="btn-save"    id="btn-save">Save</button>
      <button class="btn-reset"   id="btn-reset">Reset defaults</button>
    </div>
    <div class="btn-row">
      <button class="btn-preview" id="btn-preview">Preview post on this tab</button>
    </div>

    <div id="toast"></div>

  </div>

  <hr />
  <div class="footer">
    Edit <code>suggestions.json</code> to change defaults &amp; reload extension.
  </div>

  <script src="popup.js"></script>
</body>
</html>
